name: NSE Market Signals

on:
  workflow_dispatch:
    inputs:
      from_date:
        description: "Optional NSE start date in DD-MM-YYYY format"
        required: false
        type: string
      to_date:
        description: "Optional NSE end date in DD-MM-YYYY format"
        required: false
        type: string
  schedule:
    # GitHub Actions cron uses UTC.
    # 03:00 UTC = 08:30 IST pre-market.
    - cron: "0 3 * * 1-5"
    # 06:30 UTC = 12:00 IST intraday refresh.
    - cron: "30 6 * * 1-5"
    # 10:15 UTC = 15:45 IST post-market scan.
    - cron: "15 10 * * 1-5"
    # 15:00 UTC = 20:30 IST EOD reconciliation.
    - cron: "0 15 * * 1-5"

jobs:
  publish-nse-signals:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install requests pypdf

      - name: Publish NSE market signals
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -n "${{ inputs.from_date }}" ] && [ -n "${{ inputs.to_date }}" ]; then
            python scripts/run_nse_market_signals.py --from-date "${{ inputs.from_date }}" --to-date "${{ inputs.to_date }}"
          else
            python scripts/run_nse_market_signals.py --days 1
          fi
